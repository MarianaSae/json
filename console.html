<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JSON</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Listado de Personas</h1>

    <div id="contenedor" class="row g-4"></div>
</div>

<script>
    

fetch(url)
    .then(response => response.json())
    .then(data => {
        const contenedor = document.getElementById("contenedor");

        data.forEach(persona => {
            contenedor.innerHTML += `
                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="card-title">${persona.nombre}</h5>
                            <p><strong>Usuario:</strong> ${persona.usuario}</p>
                            <p><strong>Correo:</strong> ${persona.correo}</p>
                            <p><strong>Calle:</strong> ${persona.direccion.calle}</p>
                            <p><strong>Departamento:</strong> ${persona.direccion.departamento}</p>
                            <p><strong>Ciudad:</strong> ${persona.direccion.ciudad}</p>
                            <p><strong>CP:</strong> ${persona.direccion.codigo_postal}</p>
                            <p><strong>Latitud:</strong> ${persona.direccion.geo.latitud}</p>
                            <p><strong>Altitud:</strong> ${persona.direccion.geo.altitud}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    })
    .catch(error => console.error("Error:", error));
</script>
<script>
function obtenerPersonas() {
    fetch("personas_juarez.json")
        .then(response => response.json())
        .then(data => {
            console.log("Datos:");
            console.log(data);
        })
        .catch(error => console.error("Error:", error));
}

obtenerPersonas();
</script>

</body>
</html>
