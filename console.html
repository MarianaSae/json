<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Personas - Ciudad Juárez</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        h1 {
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        .card-body {
            color: black;
        }

        .badge-custom {
            background: #2a5298;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <h1 class="text-center mb-5">👥 Personas de Ciudad Juárez</h1>

    <!-- BUSCADOR -->
    <div class="mb-4">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar por nombre...">
    </div>

    <div id="contenedor" class="row g-4"></div>
</div>

<script>

const url = "https://json229753.atwebpages.com/personas_juarez.json";

let personasGlobal = [];

fetch(url)
    .then(res => res.json())
    .then(data => {
        personasGlobal = data;
        mostrarPersonas(data);
    });

// Mostrar tarjetas
function mostrarPersonas(data){
    const contenedor = document.getElementById("contenedor");
    contenedor.innerHTML = "";

    data.forEach(persona => {
        contenedor.innerHTML += `
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h5 class="card-title">${persona.nombre}</h5>

                        <span class="badge badge-custom mb-2">${persona.usuario}</span>

                        <p><strong>📧</strong> ${persona.correo}</p>
                        <p><strong>📍</strong> ${persona.direccion.calle}</p>
                        <p><strong>🏠</strong> ${persona.direccion.departamento}</p>
                        <p><strong>🌆</strong> ${persona.direccion.ciudad}</p>
                        <p><strong>📮</strong> ${persona.direccion.codigo_postal}</p>

                        <small class="text-muted">
                            🌎 ${persona.direccion.geo.latitud}, ${persona.direccion.geo.altitud}
                        </small>
                    </div>
                </div>
            </div>
        `;
    });
}

// BUSCADOR
document.getElementById("buscador").addEventListener("keyup", e => {
    const texto = e.target.value.toLowerCase();

    const filtrados = personasGlobal.filter(p =>
        p.nombre.toLowerCase().includes(texto)
    );

    mostrarPersonas(filtrados);
});
